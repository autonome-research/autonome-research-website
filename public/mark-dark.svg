<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" fill="none">
  <style>
    .axis-stroke { stroke: #F2F0E9; }
    .axis-fill { fill: #F2F0E9; }
  </style>
  <defs>
    <marker id="vector-arrow" viewBox="0 0 28 28" markerWidth="28" markerHeight="28"
            refX="14" refY="14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1 L28 14 L0 27 Z" fill="#B84F4F" />
    </marker>
  </defs>

  <!-- Primary axis: a clean, constant-width stroke. -->
  <path d="M39 320 L272 20"
        class="axis-stroke" stroke-width="10" stroke-linecap="butt" />

  <!-- Constant-width secondary axis with an opposing diagonal end cut. -->
  <path class="axis-fill" d="M153 171 L161 165 L285 334 L281 346 Z" />

  <!-- Circular vector around the primary axis, projected in perspective. -->
  <path d="M91 207 A111 51 38 1 1 130 233.5"
        transform="translate(12 -8)"
        stroke="#B84F4F" stroke-width="10" stroke-linecap="butt"
        marker-end="url(#vector-arrow)" />
</svg>
